directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - src/**/*.js
  - node_modules/**/*
  - package.json

win:
  target:
    - dir

mac:
  target: dmg

linux:
  target: AppImage
